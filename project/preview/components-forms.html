<!doctype html>
<!-- @dsCard group="Components" name="Components — Form inputs" subtitle="Hairline underline, charbon focus" viewport="700x240" -->
<html lang="en"><head>
<meta charset="utf-8" /><title>Forms</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:24px 28px;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--fg-3);margin-bottom:6px;}
  input,select{width:100%;box-sizing:border-box;padding:10px 12px;font-family:var(--font-body);font-size:14px;color:var(--fg-1);background:#FDFBF6;border:0;border-bottom:1px solid #000;outline:none;border-radius:0;}
  input:focus{border-bottom-color:#9B6B43;}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-2);}
  .ck{width:16px;height:16px;border:1px solid #000;border-radius:2px;display:inline-block;background:#FDFBF6;position:relative;}
  .ck.on{background:#000;}
  .ck.on::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid #D5C5A4;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);}
  .seg{display:inline-flex;border:1px solid #000;border-radius:4px;overflow:hidden;}
  .seg span{padding:8px 14px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
  .seg span.on{background:#000;color:#D5C5A4;}
</style></head>
<body>
<div class="card">
  <div><label>Nom</label><input value="Marie Tremblay" /></div>
  <div><label>Courriel</label><input value="marie@exemple.ca" /></div>
  <div><label>Secteur</label><select><option>Crête du lac</option><option>Versant sud</option><option>Forêt d'érables</option></select></div>
  <div>
    <label>Type de terrain</label>
    <div class="seg"><span class="on">Boisé</span><span>Ouvert</span><span>Riverain</span></div>
  </div>
  <div class="chk" style="grid-column:span 2"><span class="ck on"></span> Je consens à recevoir des nouvelles d'OGILVIE.</div>
</div>
</body></html>
