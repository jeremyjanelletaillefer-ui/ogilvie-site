<!doctype html>
<!-- @dsCard group="Type" name="Type — Body & editorial" subtitle="Eyebrow, heading, body, italic pull" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Body & eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:22px 28px;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:28px;}
  .eb{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--fg-3);}
  .h{font-family:'Gloock','Ibarra Real Nova',Georgia,serif;font-weight:400;font-size:20px;letter-spacing:-.01em;text-transform:uppercase;color:var(--fg-1);margin:6px 0 8px;line-height:1.1;}
  .p{font-size:13px;line-height:1.55;color:var(--fg-2);margin:0;}
  .pull{font-family:'Ibarra Real Nova',Georgia,serif;font-style:italic;font-size:22px;line-height:1.2;color:var(--fg-2);letter-spacing:-.005em;}
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="eb">Secteur 04 · Parcelle 12</div>
    <div class="h">Une crête ouverte sur le lac</div>
    <p class="p">Terrain de 1,2 hectare orienté sud-ouest, bordé d'une forêt mixte d'érables et de pins gris. Accès par la route du Mont-Blanc.</p>
  </div>
  <div>
    <div class="eb">Éditorial</div>
    <div class="pull">« Le paysage est le premier architecte ; la maison n'y arrive qu'ensuite. »</div>
  </div>
</div>
</body></html>
