<!doctype html>
<!-- @dsCard group="Components" name="Components — Tags & badges" subtitle="Pill chips: outline, solid, corten" viewport="700x120" -->
<html lang="en"><head>
<meta charset="utf-8" /><title>Tags & badges</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:#FDFBF6;}
  .card{padding:28px;font-family:var(--font-body);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .t{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:500;}
  .outline{border:1px solid #000;color:#000;}
  .solid{background:#000;color:#D5C5A4;}
  .corten{background:#9B6B43;color:#FDFBF6;}
  .sage{background:transparent;border:1px solid #8C8A73;color:#575146;}
  .dot{width:6px;height:6px;border-radius:50%;}
</style></head>
<body>
<div class="card">
  <span class="t outline"><span class="dot" style="background:#9B6B43"></span>Disponible</span>
  <span class="t solid">Réservé</span>
  <span class="t corten">Nouveau</span>
  <span class="t sage">Boisé</span>
  <span class="t outline">Riverain</span>
  <span class="t outline">1,2 ha</span>
  <span class="t outline">Sud-ouest</span>
  <span class="t solid"><span class="dot" style="background:#D5C5A4"></span>Vendu</span>
</div>
</body></html>
