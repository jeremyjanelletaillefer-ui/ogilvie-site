<!doctype html>
<!-- @dsCard group="Type" name="Type — Alternative italics" subtitle="Ibarra Real Nova + Playfair, italic only" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Alternative typefaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:20px 28px;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .col h6{margin:0 0 6px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-3);font-weight:500;}
  .name{font-size:14px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;color:var(--fg-1);margin-bottom:10px;}
  .abc{font-style:italic;font-size:22px;line-height:1.1;color:var(--fg-1);}
  .ibarra{font-family:'Ibarra Real Nova',Georgia,serif;}
  .play{font-family:'Playfair Display',Georgia,serif;}
</style>
</head>
<body>
<div class="card">
  <div class="col">
    <h6>Alternative</h6>
    <div class="name">Ibarra Real Nova — Italique</div>
    <div class="abc ibarra">ABCDEFGHIJKLMNOPQRSTUVWXYZ</div>
    <div class="abc ibarra" style="margin-top:4px">abcdefghijklmnopqrstuvwxyz</div>
    <div class="abc ibarra" style="margin-top:4px">0123456789</div>
  </div>
  <div class="col">
    <h6>Alternative</h6>
    <div class="name">Playfair Display — Italique</div>
    <div class="abc play">ABCDEFGHIJKLMNOPQRSTUVWXYZ</div>
    <div class="abc play" style="margin-top:4px">abcdefghijklmnopqrstuvwxyz</div>
    <div class="abc play" style="margin-top:4px">0123456789</div>
  </div>
</div>
</body></html>
