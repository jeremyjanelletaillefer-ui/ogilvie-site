<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Brand palette" subtitle="Five earth tones from the norms guide" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:24px 28px;font-family:var(--font-body);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:90px;border-radius:4px;border:1px solid var(--border-soft);}
  .name{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-1);font-weight:500;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="name">Charbon Profond</div><div class="hex">#000000</div></div>
    <div class="sw"><div class="chip" style="background:#D5C5A4"></div><div class="name">Sable Patiné</div><div class="hex">#D5C5A4</div></div>
    <div class="sw"><div class="chip" style="background:#9B6B43"></div><div class="name">Corten</div><div class="hex">#9B6B43</div></div>
    <div class="sw"><div class="chip" style="background:#8C8A73"></div><div class="name">Sauge des Collines</div><div class="hex">#8C8A73</div></div>
    <div class="sw"><div class="chip" style="background:#575146"></div><div class="name">Gris Forestier</div><div class="hex">#575146</div></div>
  </div>
</div>
</body></html>
