<!doctype html>
<!-- @dsCard group="Type" name="Type — Display scale" subtitle="Archivo uppercase, tight tracking" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Display scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:24px 28px;font-family:var(--font-body);}
  .row{display:flex;align-items:baseline;gap:18px;padding:10px 0;border-bottom:1px solid var(--border-soft);}
  .row:last-child{border-bottom:0;}
  .meta{flex:none;width:90px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .spec{flex:1;font-family:'Gloock','Ibarra Real Nova',Georgia,serif;font-weight:400;text-transform:uppercase;letter-spacing:0;color:var(--fg-1);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tr{font-family:'DM Sans',sans-serif;font-weight:500;}
  .sub{font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:.18em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="meta">64px</div><div class="spec" style="font-size:64px;">OGILVIE.</div></div>
  <div class="row"><div class="meta">16/18%</div><div class="spec sub" style="font-size:16px;">Les Grands Espaces</div></div>
  <div class="row"><div class="meta">14/18%</div><div class="spec sub" style="font-size:14px;">Mont-Blanc — Laurentides</div></div>
  <div class="row"><div class="meta">12/18%</div><div class="spec sub" style="font-size:12px;">Développement résidentiel</div></div>
</div>
</body></html>
