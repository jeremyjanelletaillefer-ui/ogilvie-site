<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="8pt grid, 4px–96px" viewport="700x280" -->
<html lang="en"><head>
<meta charset="utf-8" /><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:22px 28px;font-family:var(--font-body);}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;}
  .l{width:60px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .bar{height:14px;background:var(--corten);border-radius:2px;}
  .px{width:56px;font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="l">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="l">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="l">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="l">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="l">space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="l">space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="l">space-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="l">space-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="l">space-9</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
</div>
</body></html>
