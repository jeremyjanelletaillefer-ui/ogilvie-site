<!doctype html>
<!-- @dsCard group="Components" name="Components — Parcel cards" subtitle="Listing card with photo, tags, price" viewport="700x260" -->
<html lang="en"><head>
<meta charset="utf-8" /><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;background:var(--bg-paper);}
  .card{padding:22px 28px;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .lc{border:1px solid rgba(87,81,70,0.18);border-radius:4px;background:#FDFBF6;padding:16px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,0.04),0 8px 24px -8px rgba(87,81,70,0.18);}
  .eb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);font-weight:500;}
  .ti{font-family:'Gloock','Ibarra Real Nova',Georgia,serif;font-weight:400;text-transform:uppercase;letter-spacing:-.01em;font-size:18px;line-height:1.1;color:var(--fg-1);}
  .m{display:flex;gap:14px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono);}
  .ph{height:60px;background:linear-gradient(180deg,#BFAE8C,#8C8A73);border-radius:2px;filter:sepia(.3);}
  .price{font-family:'Gloock','Ibarra Real Nova',Georgia,serif;font-size:16px;font-weight:500;color:#9B6B43;}
  .tag{display:inline-block;padding:3px 8px;border:1px solid #000;border-radius:999px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;}
</style></head>
<body>
<div class="card">
  <div class="lc">
    <div class="ph"></div>
    <div class="eb">Secteur 04 · Parcelle 12</div>
    <div class="ti">Crête du lac</div>
    <div class="m"><span>1,24 ha</span><span>SUD-OUEST</span><span>BOISÉ</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span class="price">285 000 $</span><span class="tag">Disponible</span></div>
  </div>
  <div class="lc">
    <div class="ph" style="background:linear-gradient(180deg,#9B6B43,#575146)"></div>
    <div class="eb">Secteur 02 · Parcelle 07</div>
    <div class="ti">Versant des érables</div>
    <div class="m"><span>0,96 ha</span><span>EST</span><span>MIXTE</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span class="price">210 000 $</span><span class="tag" style="background:#000;color:#D5C5A4;border-color:#000;">Réservé</span></div>
  </div>
</div>
</body></html>
