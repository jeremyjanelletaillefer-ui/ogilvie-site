<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>OGILVIE — V1 Sobre · plein cadre</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #1a1612; height: 100vh; overflow: hidden; }
  .stage { width: 100vw; height: 100vh; position: relative; }
  .board-wrap { position: absolute; top: 50%; left: 50%; }
  .board { transform-origin: center; box-shadow: 0 30px 100px rgba(0,0,0,0.6); outline: 1px solid rgba(213,197,164,0.2); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="VariantSobre.jsx"></script>
<script type="text/babel">
  const Stage = () => {
    const [scale, setScale] = React.useState(() => {
      const pad = 120;
      const sw = (window.innerWidth - pad) / SIGN_W;
      const sh = (window.innerHeight - pad) / TOTAL_H;
      return Math.min(sw, sh, 1.4);
    });
    React.useEffect(() => {
      const onR = () => {
        const pad = 120;
        const sw = (window.innerWidth - pad) / SIGN_W;
        const sh = (window.innerHeight - pad) / TOTAL_H;
        setScale(Math.min(sw, sh, 1.4));
      };
      window.addEventListener('resize', onR);
      return () => window.removeEventListener('resize', onR);
    }, []);
    return (
      <div className="stage">
        <div className="board-wrap" style={{
          width: SIGN_W * scale,
          height: TOTAL_H * scale,
          transform: `translate(-50%, -50%)`,
        }}>
          <div className="board" style={{
            width: SIGN_W,
            height: TOTAL_H,
            transform: `scale(${scale})`,
            transformOrigin: 'top left',
          }}>
            <VariantSobre />
          </div>
        </div>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>
</body>
</html>
