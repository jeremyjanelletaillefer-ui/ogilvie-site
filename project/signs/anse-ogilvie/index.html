<!doctype html>
<!-- @dsCard group="Brand" name="L'Anse Ogilvie — Méga pancarte" subtitle="4 variations · 8'×8' (2× 4'×8' empilés)" -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>OGILVIE — L'Anse Ogilvie · Méga pancarte 8'×8'</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #f0eee9; }
  #root { width: 100vw; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="VariantSobre.jsx"></script>
<script type="text/babel" src="VariantContraste.jsx"></script>
<script type="text/babel" src="VariantPhoto.jsx"></script>
<script type="text/babel" src="VariantEditorial.jsx"></script>

<script type="text/babel">
  // Wrapper qui présente une pancarte avec un cartouche d'info au-dessus
  const SignWrap = ({ title, subtitle, children }) => (
    <div style={{
      padding: 40,
      background: '#1a1612',
      width: SIGN_W + 80,
      minHeight: TOTAL_H + 140,
      display: 'flex',
      flexDirection: 'column',
      gap: 18,
    }}>
      <div style={{ color: '#D5C5A4', fontFamily: 'DM Sans, sans-serif' }}>
        <div style={{ fontSize: 11, letterSpacing: '0.32em', textTransform: 'uppercase', opacity: 0.6, marginBottom: 6 }}>
          Pancarte 8 pi × 8 pi · 2× panneaux 4'×8'
        </div>
        <div style={{ fontSize: 22, fontFamily: 'Gloock, serif', textTransform: 'uppercase', letterSpacing: '0.02em' }}>
          {title}
        </div>
        {subtitle && (
          <div style={{ fontSize: 13, opacity: 0.7, marginTop: 4, fontStyle: 'italic', fontFamily: 'Ibarra Real Nova, serif' }}>
            {subtitle}
          </div>
        )}
      </div>
      <div style={{
        position: 'relative',
        boxShadow: '0 30px 80px rgba(0,0,0,0.6)',
        outline: '1px solid rgba(213,197,164,0.2)',
      }}>
        {children}
        {/* Indicateur de jonction physique entre les deux 4×8 */}
        <div style={{
          position: 'absolute',
          left: -1, right: -1,
          top: SIGN_H - 1, height: 2,
          background: 'rgba(213,197,164,0.0)',
          borderTop: '1px dashed rgba(213,197,164,0.55)',
          pointerEvents: 'none',
        }} />
        <div style={{
          position: 'absolute',
          right: -120, top: SIGN_H - 8,
          fontFamily: 'ui-monospace, Menlo, monospace',
          fontSize: 10, letterSpacing: '0.18em',
          color: 'rgba(213,197,164,0.55)',
          textTransform: 'uppercase',
        }}>
          jonction 4×8
        </div>
      </div>
    </div>
  );

  const App = () => (
    <DesignCanvas
      title="L'Anse Ogilvie — Méga pancarte"
      subtitle="2 panneaux 4'×8' empilés (paysage) · design unifié · 9 terrains · Lac Rougeaud"
    >
      <DCSection id="anse-ogilvie" title="L'Anse Ogilvie · variations">
        <DCArtboard id="v1-sobre" label="01 — Sobre · sable + charbon" width={SIGN_W + 80} height={TOTAL_H + 140}>
          <SignWrap title="Variante 01 — Sobre" subtitle="Sable patiné, plan dominant, hiérarchie typographique stricte.">
            <VariantSobre />
          </SignWrap>
        </DCArtboard>

        <DCArtboard id="v2-contraste" label="02 — Contrasté · charbon + corten" width={SIGN_W + 80} height={TOTAL_H + 140}>
          <SignWrap title="Variante 02 — Contrasté" subtitle="Charbon profond en haut, corten + sable en bas. Lue de très loin.">
            <VariantContraste />
          </SignWrap>
        </DCArtboard>

        <DCArtboard id="v3-photo" label="03 — Photo dominante" width={SIGN_W + 80} height={TOTAL_H + 140}>
          <SignWrap title="Variante 03 — Photo dominante" subtitle="Bandeau paysage sépia full-bleed, plan + courtier sur sable.">
            <VariantPhoto />
          </SignWrap>
        </DCArtboard>

        <DCArtboard id="v4-editorial" label="04 — Éditorial · plan plein-pied" width={SIGN_W + 80} height={TOTAL_H + 140}>
          <SignWrap title="Variante 04 — Éditorial" subtitle="Plan continu sur 8 pi de haut à gauche · italique éditorial · corten au bas.">
            <VariantEditorial />
          </SignWrap>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
