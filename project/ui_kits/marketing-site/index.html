<!doctype html>
<!-- @dsCard group="UI Kit — Marketing Site" name="UI Kit — Marketing site" subtitle="Hero, parcel grid, map, detail drawer — click-thru" viewport="1280x900" -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>OGILVIE. — Les grands espaces, Mont-Blanc</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin:0; padding:0; background:#FDFBF6; color:#000; }
  body { font-family: 'DM Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Detail.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState(() => localStorage.getItem('ogilvie:route') || 'accueil');
  const [openParcel, setOpenParcel] = useState(null);
  const [contactOpen, setContactOpen] = useState(false);

  useEffect(() => { localStorage.setItem('ogilvie:route', route); window.scrollTo(0, 0); }, [route]);

  const nav = (id) => {
    if (id === 'contact') setContactOpen(true);
    else setRoute(id);
  };

  return (
    <div data-screen-label={route}>
      <TopBar current={route} onNav={nav} />

      {route === 'accueil' && <>
        <Hero />
        <StatsStrip />
        <Manifest />
        <EditorialCut />
        <ContactStrip onOpenContact={()=>setContactOpen(true)} />
      </>}

      {route === 'terrains' && <>
        <ParcelGrid onOpen={setOpenParcel} />
        <EditorialCut />
      </>}

      {route === 'carte' && <>
        <MapSection />
        <ContactStrip onOpenContact={()=>setContactOpen(true)} />
      </>}

      {route === 'histoire' && <>
        <Manifest />
        <EditorialCut />
        <ContactStrip onOpenContact={()=>setContactOpen(true)} />
      </>}

      <Footer />

      <ParcelDetail parcel={openParcel} onClose={()=>setOpenParcel(null)} onReserve={()=>{ setOpenParcel(null); setContactOpen(true); }}/>
      <ContactSheet open={contactOpen} onClose={()=>setContactOpen(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
